services:
  - type: web
    name: buzz-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_EXPIRES_IN
        value: 7d
      # Note: MONGODB_URI, JWT_SECRET, and CLIENT_URL should be added secretly in the Render Dashboard
